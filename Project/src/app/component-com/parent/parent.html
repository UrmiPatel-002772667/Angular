<div class="container text-center">
    <div class="row m-5">
        <div class="col-12">
            <div class="text-warning">
                <h2>Example of 1 & 2 (Parent -> Child & Child -> Parent)</h2>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-6">
        <div class="text_info">
            <h2>Parent Component</h2>
        </div>
        <div class="text-warning m-3">
            <h4>{{receiveMsg}}</h4>
        </div>
        </div>
        <div class="vr p-0"></div> 
        <div class="col-5">
            <app-child [childInputProperty]="parentProperty" (childOutputProperty)="receiveData($event)"></app-child>
        </div>
    </div>
    <div class="row m-5">
        <div class="col-12">
            <div class="text-warning">
                <h2>Example of 3 (Sibling Component)</h2>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-6">
        <div class="text_info">
            <app-sibling1 (sibling1Output)="receiveEvent1($event)" [sibling1Input]="sibling2Data"></app-sibling1>
        </div>
        <div class="text-warning m-3">
            <h4>{{receiveMsg}}</h4>
        </div>
        </div>
        <div class="vr p-0"></div> 
        <div class="col-5">
            <app-sibling2 [sibling2Data]="sibling1Data" (sibling2Property)="receiveEvent2($event)"></app-sibling2>
        </div>
    </div>
    <div class="row m-5">
        <div class="col-12">
            <div class="text-warning">
                <h2>Example of 4 (Parent -> Child using ViewChild)</h2>
            </div>
        </div>
        <div class="row m-2">
            <app-reusable #reusable></app-reusable>
        </div>
    </div>
</div>
